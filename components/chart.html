<!-- DATA_INJECT -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #080810;
  --bg2:     #0d0d1a;
  --bg3:     #111128;
  --border:  #1e1e3a;
  --border2: #2e2e5a;
  --text:    #f0eee8;
  --muted:   #7070a0;
  --faint:   #3a3a6a;
  --accent:  #4466ff;
  --mono:    'DM Mono', monospace;
  --display: 'Syne', sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  padding: 0 0 32px 0;
}

/* ── Grid principal ── */
.dashboard {
  display: grid;
  grid-template-columns: 1fr 320px;
  grid-template-rows: auto auto auto;
  gap: 14px;
  padding: 4px 2px 0;
}

/* ── Cards ── */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 18px 20px 14px;
  transition: border-color .25s;
}
.card:hover { border-color: var(--border2); }

.card-label {
  font-size: .65rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--faint);
  border-left: 2px solid var(--faint);
  padding-left: 7px;
  margin-bottom: 14px;
}

/* ── Gráfico principal ── */
.card-main  { grid-column: 1; grid-row: 1; }
.card-pie   { grid-column: 2; grid-row: 1; }
.card-delta { grid-column: 1; grid-row: 2; }
.card-table { grid-column: 1 / -1; grid-row: 3; }

canvas { display: block; width: 100% !important; }

/* ── Leyenda ── */
.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 12px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 20px;
  cursor: pointer;
  transition: all .2s;
  user-select: none;
}
.legend-item:hover { border-color: var(--border2); color: var(--text); }
.legend-item.hidden { opacity: .35; }
.legend-dot {
  width: 8px; height: 8px;
  border-radius: 50%; flex-shrink: 0;
}

/* ── Barras de delta ── */
.delta-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.delta-label {
  width: 130px;
  text-align: right;
  color: var(--muted);
  font-size: .7rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.delta-bar-wrap {
  flex: 1;
  height: 20px;
  background: var(--bg3);
  border-radius: 3px;
  overflow: visible;
  position: relative;
}
.delta-bar {
  position: absolute;
  height: 100%;
  border-radius: 3px;
  top: 0;
  transition: width .6s cubic-bezier(.22,1,.36,1);
}
.delta-val {
  width: 54px;
  text-align: left;
  font-size: .7rem;
  font-weight: 500;
}

/* ── Tabla ── */
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: .68rem;
}
.data-table th {
  color: var(--muted);
  font-weight: 400;
  letter-spacing: .06em;
  border-bottom: 1px solid var(--border);
  padding: 5px 10px;
  text-align: right;
  white-space: nowrap;
}
.data-table th:first-child { text-align: left; }
.data-table td {
  padding: 4px 10px;
  text-align: right;
  border-bottom: 1px solid var(--border);
  color: var(--muted);
  transition: background .15s;
}
.data-table td:first-child { text-align: left; color: var(--text); font-weight: 500; }
.data-table tr:hover td { background: var(--bg3); color: var(--text); }
.data-table .heat-high { color: #FF4455 !important; }
.data-table .heat-mid  { color: #FFAA22 !important; }
.data-table .heat-low  { color: #2DDBA4 !important; }

/* ── Tooltip custom ── */
.tooltip-custom {
  position: fixed;
  background: #10101e;
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 10px 14px;
  pointer-events: none;
  font-size: .72rem;
  color: var(--text);
  z-index: 9999;
  display: none;
  min-width: 160px;
  box-shadow: 0 4px 24px rgba(0,0,0,.6);
}
.tooltip-year {
  font-family: var(--display);
  font-size: 1rem;
  font-weight: 700;
  margin-bottom: 6px;
  color: var(--text);
}
.tooltip-row {
  display: flex;
  align-items: center;
  gap: 7px;
  margin: 3px 0;
  color: var(--muted);
}
.tooltip-row .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.tooltip-row .val { margin-left: auto; color: var(--text); font-weight: 500; }

/* ── Fade in ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.card { animation: fadeUp .4s ease both; }
.card:nth-child(1) { animation-delay: .05s; }
.card:nth-child(2) { animation-delay: .12s; }
.card:nth-child(3) { animation-delay: .18s; }
.card:nth-child(4) { animation-delay: .24s; }
</style>
</head>
<body>

<div class="dashboard">

  <!-- ── Gráfico principal ── -->
  <div class="card card-main">
    <div class="card-label" id="main-label">Evolución temporal</div>
    <canvas id="mainChart" height="260"></canvas>
    <div class="legend" id="mainLegend"></div>
  </div>

  <!-- ── Donut ── -->
  <div class="card card-pie">
    <div class="card-label" id="pie-label">Distribución</div>
    <canvas id="pieChart" height="220"></canvas>
  </div>

  <!-- ── Delta barras ── -->
  <div class="card card-delta">
    <div class="card-label" id="delta-label">Cambio en participación (pp)</div>
    <div id="deltaContainer"></div>
  </div>

  <!-- ── Tabla ── -->
  <div class="card card-table">
    <div class="card-label">Datos por década</div>
    <div style="overflow-x:auto">
      <table class="data-table" id="dataTable"></table>
    </div>
  </div>

</div>

<div class="tooltip-custom" id="tooltip"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
const D = window.__DASH_DATA__;
if (!D) { document.body.innerHTML = '<p style="color:#555;padding:2rem">Esperando datos...</p>'; throw new Error('no data'); }

// ── Defaults Chart.js ──────────────────────────────────────────────────────
Chart.defaults.font.family  = "'DM Mono', monospace";
Chart.defaults.font.size    = 11;
Chart.defaults.color        = '#5a5a8a';

// ── Labels ────────────────────────────────────────────────────────────────
document.getElementById('main-label').textContent =
  `Evolución temporal · ${D.yearStart}–${D.yearEnd}`;
document.getElementById('pie-label').textContent =
  `Distribución en ${D.pieYear}`;
document.getElementById('delta-label').textContent =
  `Cambio en participación · ${D.yearStart} → ${D.yearEnd} (pp)`;

// ── Gráfico principal ──────────────────────────────────────────────────────
const typeMap = {
  'Área apilada':   'line',
  'Líneas':         'line',
  'Barras apiladas':'bar',
};
const chartType = typeMap[D.chartType] || 'line';
const isStacked = D.chartType !== 'Líneas';

const mainDatasets = D.datasets.map(ds => ({
  label:           ds.label,
  data:            ds.values,
  borderColor:     ds.color,
  backgroundColor: ds.color + (isStacked ? '28' : '18'),
  fill:            D.chartType === 'Área apilada',
  tension:         0.38,
  borderWidth:     D.chartType === 'Líneas' ? 2.2 : 1.8,
  pointRadius:     0,
  pointHoverRadius:5,
  pointHoverBackgroundColor: ds.color,
}));

const tooltip = document.getElementById('tooltip');

const mainCtx = document.getElementById('mainChart').getContext('2d');
const mainChart = new Chart(mainCtx, {
  type: chartType,
  data: { labels: D.years, datasets: mainDatasets },
  options: {
    responsive: true,
    animation: { duration: 900, easing: 'easeInOutQuart' },
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: { enabled: false },
    },
    scales: {
      x: {
        stacked: isStacked,
        grid:  { color: '#12122a', drawBorder: false },
        ticks: { color: '#4a4a7a', maxTicksLimit: 10 },
      },
      y: {
        stacked: isStacked,
        grid:  { color: '#12122a', drawBorder: false },
        ticks: { color: '#4a4a7a', callback: v => v.toFixed(0) + '%' },
        max:   isStacked ? 100 : undefined,
      },
    },
    onHover: (evt, els) => {
      if (!els.length) { tooltip.style.display = 'none'; return; }
      const idx = els[0].index;
      const year = D.years[idx];
      let html = `<div class="tooltip-year">${year}</div>`;
      D.datasets.forEach(ds => {
        const val = ds.values[idx];
        html += `<div class="tooltip-row">
          <span class="dot" style="background:${ds.color}"></span>
          <span>${ds.label}</span>
          <span class="val">${val.toFixed(1)}%</span>
        </div>`;
      });
      tooltip.innerHTML = html;
      tooltip.style.display = 'block';
      const rect = mainCtx.canvas.getBoundingClientRect();
      tooltip.style.left = (rect.left + window.scrollX + evt.x + 14) + 'px';
      tooltip.style.top  = (rect.top  + window.scrollY + evt.y - 20) + 'px';
    },
  },
});

document.getElementById('mainChart').addEventListener('mouseleave', () => {
  tooltip.style.display = 'none';
});

// ── Leyenda interactiva ────────────────────────────────────────────────────
const legend = document.getElementById('mainLegend');
D.datasets.forEach((ds, i) => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<span class="legend-dot" style="background:${ds.color}"></span>${ds.label}`;
  item.onclick = () => {
    const meta = mainChart.getDatasetMeta(i);
    meta.hidden = !meta.hidden;
    item.classList.toggle('hidden', meta.hidden);
    mainChart.update();
  };
  legend.appendChild(item);
});

// ── Donut ──────────────────────────────────────────────────────────────────
const pieCtx = document.getElementById('pieChart').getContext('2d');
new Chart(pieCtx, {
  type: 'doughnut',
  data: {
    labels:   D.pie.map(p => p.label),
    datasets: [{
      data:            D.pie.map(p => p.value),
      backgroundColor: D.pie.map(p => p.color + 'cc'),
      borderColor:     D.pie.map(p => p.color),
      borderWidth:     1.5,
      hoverOffset:     6,
    }],
  },
  options: {
    responsive: true,
    cutout: '60%',
    animation: { duration: 900, easing: 'easeInOutQuart' },
    plugins: {
      legend: {
        position: 'bottom',
        labels: {
          color: '#7070a0',
          boxWidth: 10,
          boxHeight: 10,
          padding: 10,
          font: { size: 10 },
          usePointStyle: true,
          pointStyle: 'circle',
        },
      },
      tooltip: {
        backgroundColor: '#10101e',
        borderColor:     '#2e2e5a',
        borderWidth:     1,
        titleColor:      '#f0eee8',
        bodyColor:       '#7070a0',
        callbacks: {
          label: ctx => ` ${ctx.label}: ${ctx.parsed.toFixed(1)}%`,
        },
      },
    },
  },
});

// ── Barras de delta ────────────────────────────────────────────────────────
const maxAbs = Math.max(...D.cambios.map(c => Math.abs(c.delta)), 1);
const container = document.getElementById('deltaContainer');

D.cambios.forEach(c => {
  const pct     = Math.abs(c.delta) / maxAbs * 48; // % del ancho total (la mitad)
  const isPos   = c.delta >= 0;
  const barLeft = isPos ? '50%' : `calc(50% - ${pct}%)`;
  const color   = isPos ? c.color : '#FF4455';

  const row = document.createElement('div');
  row.className = 'delta-row';
  row.innerHTML = `
    <span class="delta-label">${c.label}</span>
    <div class="delta-bar-wrap">
      <div style="position:absolute;top:0;bottom:0;left:50%;width:1px;background:#1e1e3a;z-index:1"></div>
      <div class="delta-bar" style="
        left:${barLeft};
        width:${pct}%;
        background:${color}55;
        border:1px solid ${color}88;
        z-index:2;
      "></div>
    </div>
    <span class="delta-val" style="color:${color}">${c.delta > 0 ? '+' : ''}${c.delta.toFixed(1)}pp</span>
  `;
  container.appendChild(row);
});

// ── Tabla por década ───────────────────────────────────────────────────────
const decades = [1965,1970,1975,1980,1985,1990,1995,2000,2005,2010,2015,2020,2024];
const rawData = {};
D.datasets.forEach(ds => {
  rawData[ds.label] = {};
  decades.forEach(yr => {
    const idx = D.years.indexOf(yr);
    rawData[ds.label][yr] = idx >= 0 ? ds.values[idx] : null;
  });
});

const table = document.getElementById('dataTable');

// Header
const thead = table.createTHead();
const hrow  = thead.insertRow();
hrow.innerHTML = '<th>Región</th>' + decades.map(y => `<th>${y}</th>`).join('');

// Body
const tbody = table.createTBody();
D.datasets.forEach(ds => {
  const row = tbody.insertRow();
  let html = `<td><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${ds.color};margin-right:7px;vertical-align:middle"></span>${ds.label}</td>`;
  const vals = decades.map(y => rawData[ds.label][y]);
  const max  = Math.max(...vals.filter(Boolean));
  const min  = Math.min(...vals.filter(Boolean));
  vals.forEach(v => {
    let cls = '';
    if (v !== null) {
      if (v >= max * 0.85)      cls = 'heat-high';
      else if (v >= max * 0.55) cls = 'heat-mid';
      else if (v <= min * 1.2)  cls = 'heat-low';
    }
    html += `<td class="${cls}">${v !== null ? v.toFixed(1) + '%' : '—'}</td>`;
  });
  row.innerHTML = html;
});
</script>
</body>
</html>
